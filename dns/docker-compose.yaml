# Split DNS sidecar — routes local domains to LAN DNS, everything else to Mullvad.
# Started by install-server.sh only when DNS_MODE=split.
#
# Runs in gluetun's network namespace on port 5353.
# Gluetun's built-in DNS proxy has hardcoded rebinding protection that blocks
# DNS responses containing private IPs (RFC1918). This cannot be disabled and
# DNS_REBINDING_PROTECTION_EXEMPT_HOSTNAMES only supports exact hostnames, not
# wildcards. The workaround is an iptables DNAT rule (in mullvad-exitnode-init.sh)
# that redirects :53 -> :5353, bypassing gluetun's DNS proxy entirely.
services:
  dnsmasq:
    build:
      context: .
      dockerfile: Containerfile
    container_name: tailbox-dns
    network_mode: "container:mullvad-gateway"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /run
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf:ro
    labels:
      - autoheal=true
    healthcheck:
      test: ["CMD-SHELL", "nslookup example.com 127.0.0.1 -port=5353 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.05'
